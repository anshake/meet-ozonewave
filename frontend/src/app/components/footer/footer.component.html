<footer id="contact" class="border-t border-border">
  <div class="px-5 py-6 max-w-5xl mx-auto md:px-10">
    <div class="flex flex-col gap-4 items-center text-center sm:flex-row sm:justify-between sm:text-left">
      <span class="text-faint text-xs">© 2026 OzoneWave</span>
      <div class="flex gap-5 items-center">
        <a href="https://www.linkedin.com/in/antonpavlik" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"
           class="text-amber hover:text-amber2 transition-colors min-h-11 min-w-11 flex items-center justify-center">
          <i class="fa-brands fa-linkedin text-base"></i>
        </a>
        <a href="https://github.com/anshake/meet-ozonewave" target="_blank" rel="noopener noreferrer" aria-label="GitHub"
           class="text-amber hover:text-amber2 transition-colors min-h-11 min-w-11 flex items-center justify-center">
          <i class="fa-brands fa-github text-base"></i>
        </a>
        @if (revealed()) {
          <a [href]="mailHref" class="text-dim text-xs hover:text-muted transition-colors py-3">
            {{ mailLabel }}
          </a>
        } @else {
          <button (click)="reveal()" class="text-dim text-xs hover:text-muted transition-colors py-3 cursor-pointer bg-transparent border-none">
            email me
          </button>
        }
      </div>
    </div>
  </div>
</footer>
