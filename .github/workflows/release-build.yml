name: Release Build
run-name: "Release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Update pom versions
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false --no-transfer-progress

      - name: Commit and tag release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A '*.xml'
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"

      - name: Build with Maven
        run: mvn -B package --file pom.xml --no-transfer-progress -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Bump to next SNAPSHOT
        run: |
          NEXT_SNAPSHOT=$(echo "${{ inputs.version }}" | awk -F. '{print $1"."$2"."$3+1"-SNAPSHOT"}')
          mvn versions:set -DnewVersion=$NEXT_SNAPSHOT -DgenerateBackupPoms=false --no-transfer-progress
          git add -A '*.xml'
          git commit -m "Bump version to $NEXT_SNAPSHOT"

      - name: Push commits and tag
        run: git push origin HEAD "v${{ inputs.version }}"