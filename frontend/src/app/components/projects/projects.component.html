<section id="projects" class="border-b border-border">
  <div class="px-5 py-12 max-w-5xl mx-auto md:px-10">
    <p class="text-amber text-sm tracking-widest mb-7">// selected projects</p>
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (project of projects; track project.title) {
        <div class="bg-bg2 border border-border rounded-md p-5 transition-colors duration-200 hover:border-border2">
          <h3 class="text-amber font-medium text-base mb-1">{{ project.title }}</h3>
          <p class="text-teal text-xs tracking-widest mb-2.5">{{ project.category }} · {{ project.year }}</p>
          <p class="text-muted text-[13px] leading-relaxed">{{ project.description }}</p>
          <div class="flex gap-2 flex-wrap mt-4">
            @for (tag of project.tags; track tag) {
              <span class="text-muted text-xs border border-border2 rounded px-2 py-0.5">{{ tag }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
