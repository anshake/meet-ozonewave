<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark pill background -->
  <circle cx="16" cy="16" r="16" fill="#0d1117"/>

  <!-- Wave: two humps (S-curve) in orange-gold -->
  <path d="M 2 16 C 6 7, 10 7, 16 16 C 22 25, 26 25, 30 16"
        fill="none"
        stroke="#f5a623"
        stroke-width="3.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Second smaller wave below for depth -->
  <path d="M 5 20 C 8 15, 11 15, 16 20 C 21 25, 24 25, 27 20"
        fill="none"
        stroke="#c97d10"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.6"/>
</svg>
